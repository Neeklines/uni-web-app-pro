name: Backend CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  test:
    name: pr-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run black check
        run: |
          cd backend
          black --check app tests

      - name: Run flake8
        run: |
          cd backend
          flake8 app tests

      - name: Run tests
        run: |
          cd backend
          pytest